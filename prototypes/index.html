function assetReturns(asset) {
  const variation = asset.avg ? (asset.price - asset.avg) / asset.avg : 0;
  const cost = asset.qty * asset.avg;
  const distNet = (typeof DISTRIBUTIONS !== "undefined" ? DISTRIBUTIONS : [])

    .reduce((s, d) => s + d.net, 0);
  const rentabilidade = cost ? ((asset.price - asset.avg) * asset.qty + distNet) / cost : 0;
  return { variation, rentabilidade, distNet, cost };
}

// Net worth allocation evolution — last 12 months, per asset class. Used by Patrimônio drilldown.
// Defined as a hoisted function so it can be called even though ALLOCATION_BY_CLASS is declared later.
function allocationHistory() {
  const monthsBack = 12;
  const out = [];
  for (let m = 0; m < monthsBack; m++) {
    const t = m / (monthsBack - 1);
    const row = { month: m };
    ALLOCATION_BY_CLASS.forEach(({ klass, value }) => {
      // Value 12 months ago was ~78% of today, plus mild fluctuation per class
      const start = value * (0.78 + (klass === "CRYPTO" ? 0.05 : 0));
      const noise = Math.sin(m * 0.7 + klass.length) * value * 0.03;
      row[klass] = Math.max(0, Math.round(start + (value - start) * t + noise));
    });
    out.push(row);
  }
  return out;
}

 * FORMATTING HELPERS
 * =================================================================== */

const fmtBRL = (n, opts = {}) => {
  const { compact = false, sign = false } = opts;
  if (n == null) return "—";
  const formatter = new Intl.NumberFormat("pt-BR", {
    style: "currency",
    currency: "BRL",
    minimumFractionDigits: compact ? 0 : 2,
    maximumFractionDigits: compact ? 0 : 2,
    notation: compact ? "compact" : "standard",
  });
  const out = formatter.format(Math.abs(n));
  if (sign) return (n >= 0 ? "+" : "−") + out.replace("R$", "R$ ");
  return n < 0 ? "−" + out : out;
};

const fmtUSD = (n, opts = {}) => {
  const { compact = false, sign = false } = opts;
  if (n == null) return "—";
  const formatter = new Intl.NumberFormat("en-US", {
    style: "currency",
    currency: "USD",
    minimumFractionDigits: compact ? 0 : 2,
    maximumFractionDigits: compact ? 0 : 2,
    notation: compact ? "compact" : "standard",
  });
  const out = formatter.format(Math.abs(n));
  if (sign) return (n >= 0 ? "+" : "−") + out;
  return n < 0 ? "−" + out : out;
};

const fmtMoney = (n, ccy, opts) => (ccy === "USD" ? fmtUSD(n, opts) : fmtBRL(n, opts));
const fmtNum = (n, dp = 0) => n == null ? "—" : new Intl.NumberFormat("pt-BR", { minimumFractionDigits: dp, maximumFractionDigits: dp }).format(n);
const fmtPct = (n, dp = 1, sign = false) => {
  if (n == null) return "—";
  const v = (n * 100).toFixed(dp);
  return (sign && n > 0 ? "+" : "") + v + "%";
};
const fmtDate = (iso) => new Intl.DateTimeFormat("pt-BR").format(new Date(iso));
const fmtRelDate = (iso) => {
  const d = new Date(iso);
  const today = new Date("2026-05-04");
  const diff = Math.round((today - d) / (1000 * 60 * 60 * 24));
  if (diff === 0) return "Hoje";
  if (diff === 1) return "Ontem";
  if (diff < 7) return `Há ${diff} dias`;
  return fmtDate(iso);
};

/* =====================================================================
 * SVG CHART PRIMITIVES
 * =================================================================== */

function DonutChart({ data, size = 200, stroke = 22 }) {
  const total = data.reduce((s, d) => s + d.value, 0);
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  let acc = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <g transform={`translate(${size / 2}, ${size / 2}) rotate(-90)`}>
        <circle r={r} fill="none" stroke="currentColor" strokeOpacity="0.08" strokeWidth={stroke} />
        {data.map((d, i) => {
          const frac = d.value / total;
          const dash = c * frac;
          const gap = c - dash;
          const offset = -c * acc;
          acc += frac;
          return (
            <circle key={i} r={r} fill="none" stroke={d.color} strokeWidth={stroke}
              strokeDasharray={`${dash} ${gap}`} strokeDashoffset={offset} strokeLinecap="butt" />
          );
        })}
      </g>
    </svg>
  );
}

function Sparkline({ data, w = 120, h = 28, color = "#818cf8", filled = true }) {
  if (!data || !data.length) return null;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const stepX = w / (data.length - 1);
  const pts = data.map((v, i) => `${(i * stepX).toFixed(2)},${(h - ((v - min) / range) * h).toFixed(2)}`);
  const path = "M " + pts.join(" L ");
  const areaPath = path + ` L ${w},${h} L 0,${h} Z`;
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="overflow-visible">
      {filled && <path d={areaPath} fill={color} fillOpacity="0.12" />}
      <path d={path} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function BarMonths({ data, w = 220, h = 56, color = "#818cf8" }) {
  const max = Math.max(...data);
  const barW = w / data.length - 2;
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      {data.map((v, i) => {
        const bh = (v / max) * (h - 4);
        return (
          <rect key={i} x={i * (barW + 2)} y={h - bh} width={barW} height={bh} rx="2"
            fill={color} fillOpacity={i === data.length - 1 ? "1" : "0.55"} />
        );
      })}
    </svg>
  );
}

function HBar({ value, max, color = "#6366f1", height = 6 }) {
  const pct = Math.min(100, (value / max) * 100);
  return (
    <div className="w-full rounded-full bg-gray-200 dark:bg-gray-800 overflow-hidden" style={{ height }}>
      <div className="h-full rounded-full" style={{ width: pct + "%", background: color }} />
    </div>
  );
}

function ThemeSegmented() {
  const [mode, setMode] = useState(() => localStorage.getItem("ng-theme") || "dark");
  useEffect(() => {
    const root = document.documentElement;
    if (mode === "dark") root.classList.add("dark");
    else if (mode === "light") root.classList.remove("dark");
    else {
      const sysDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      root.classList.toggle("dark", sysDark);
    }
    localStorage.setItem("ng-theme", mode);
  }, [mode]);
  const opts = [
    { id: "light",  icon: "sun",     title: "Tema claro" },
    { id: "dark",   icon: "moon",    title: "Tema escuro" },
    { id: "system", icon: "monitor", title: "Tema do sistema" },
  ];
  return (
    <div className="inline-flex items-center rounded-lg p-0.5 bg-gray-100 dark:bg-gray-900 border border-gray-200 dark:border-gray-800">
      {opts.map(o => (
        <button key={o.id} onClick={() => setMode(o.id)} title={o.title}
          className={`w-7 h-7 inline-flex items-center justify-center rounded-md transition-colors
            ${mode === o.id
              ? "bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 shadow-sm"
              : "text-gray-500 hover:text-gray-300"}`}>
          <Icon name={o.icon} className="w-3.5 h-3.5" />
        </button>
      ))}
    </div>
  );
}

function ComfortToggle() {

function NovoButton({ route }) {
  const [open, setOpen] = useState(false);
  const composer = useComposer();
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const onClick = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", onClick);
    return () => document.removeEventListener("mousedown", onClick);
  }, [open]);

  // Context-aware default item — the most likely action given current route
  const inferDefault = () => {
    if (route.startsWith("/conta/")) {
      const id = route.split("/")[2];
      const acc = accById[id];
      if (acc?.type === "investment") return "movement";
      if (acc?.type === "checking")   return "transaction";
    }
    if (route.startsWith("/cartao/"))      return "card-tx";
    if (route.startsWith("/instituicao/")) return "movement";
    if (route === "/cartoes")              return "new-card";
    if (route === "/contas")               return "new-account";
    if (route.startsWith("/proventos"))    return "distribution";
    if (route.startsWith("/lancamentos"))  return "movement";
    if (route.startsWith("/movimentacoes"))return "transaction";
    return "movement";
  };
  const defaultId = inferDefault();

  const items = [
    { id: "movement",     label: "Lançamento",     desc: "Compra, venda, bonificação…",          icon: "arrow-down-up", group: "Investimentos" },
    { id: "distribution", label: "Provento",       desc: "Dividendo, juros, JCP, aluguel",       icon: "coins",         group: "Investimentos" },
    { id: "transaction",  label: "Movimentação",   desc: "Cash flow em conta corrente",          icon: "wallet",        group: "Caixa & Cartões" },
    { id: "card-tx",      label: "Lançamento de cartão", desc: "Compra na fatura aberta",        icon: "credit-card",   group: "Caixa & Cartões" },
    { id: "asset",        label: "Ativo",          desc: "Cadastrar um novo ativo",              icon: "line-chart",    group: "Cadastros" },
    { id: "new-account",  label: "Conta",          desc: "Nova conta corrente ou de investimento", icon: "layers",      group: "Cadastros" },
    { id: "new-card",     label: "Cartão",         desc: "Novo cartão de crédito",               icon: "credit-card",   group: "Cadastros" },
  ];
  const groups = ["Investimentos", "Caixa & Cartões", "Cadastros"];

  return (
    <div className="relative" ref={ref}>
      <button
        onClick={() => setOpen(v => !v)}
        className="inline-flex items-center gap-1.5 h-8 px-3 rounded-lg text-[12px] font-medium
          bg-indigo-500 hover:bg-indigo-400 text-white transition-colors">

        <div className="menu-pop absolute right-0 top-10 z-50 w-72 rounded-xl
          bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 shadow-2xl shadow-black/30 p-2">
          {groups.map(g => (
            <Fragment key={g}>
              <div className="px-2 pt-2 pb-1 text-[10px] uppercase tracking-wider font-semibold text-gray-500">{g}</div>
              {items.filter(it => it.group === g).map(it => {
                const isDefault = it.id === defaultId;
                return (
                  <button key={it.id} onClick={() => { setOpen(false); composer.open(it.id); }}
                    className={`w-full text-left flex items-start gap-2.5 px-2 py-1.5 rounded-md transition-colors

function ymOf(iso) { return iso.slice(0, 7); }
function groupByYM(items) {
  const out = {};
  items.forEach(it => { const k = ymOf(it.d); (out[k] = out[k] || []).push(it); });
  const keys = Object.keys(out).sort((a, b) => b.localeCompare(a));
  return keys.map(k => ({ ym: k, items: out[k] }));
}

/* ---------- Composer context + Modal shell + Form primitives ---------- */

const ComposerContext = createContext({ open: () => {}, close: () => {} });
const useComposer = () => useContext(ComposerContext);

function ComposerProvider({ children }) {
  const [state, setState] = useState({ type: null, prefill: null });
  const value = useMemo(() => ({
    type: state.type,
    open:  (type, prefill = {}) => setState({ type, prefill }),
    close: () => setState({ type: null, prefill: null }),
  }), [state.type]);
  return (
    <ComposerContext.Provider value={value}>
      {children}
      {state.type && <ComposerHost type={state.type} prefill={state.prefill} onClose={value.close}/>}
    </ComposerContext.Provider>
  );
}

function ComposerHost({ type, prefill, onClose }) {
  return (
    <Modal onClose={onClose}>
      {type === "movement"     && <MovementComposer    prefill={prefill} onClose={onClose}/>}
      {type === "distribution" && <DistributionComposer prefill={prefill} onClose={onClose}/>}
      {type === "transaction"  && <TransactionComposer prefill={prefill} onClose={onClose}/>}
      {type === "card-tx"      && <CardTxComposer      prefill={prefill} onClose={onClose}/>}
      {type === "asset"       && <NewAssetComposer prefill={prefill} onClose={onClose}/>}
      {type === "new-account" && <NewAccountComposer prefill={prefill} onClose={onClose}/>}
      {type === "new-card"    && <NewCardComposer prefill={prefill} onClose={onClose}/>}
    </Modal>
  );
}

function Modal({ onClose, children, width = "max-w-2xl" }) {
  // Escape closes
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
      <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={onClose}/>
      <div className={`menu-pop relative w-full ${width} bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-2xl overflow-hidden max-h-[88vh] flex flex-col`}>
        {children}
      </div>
    </div>
  );
}

function ActivityKindBadge({ kind, type }) {
  const cfg = {
    movement:     { bg: "bg-blue-500/15",     text: "text-blue-400",     label: typeMovementLabel(type) },
    distribution: { bg: "bg-amber-500/15",    text: "text-amber-400",    label: typeDistributionLabel(type) },
    transaction:  { bg: "bg-violet-500/15",   text: "text-violet-300",   label: "Movimentação" },
  }[kind];
  return (
    <span className={`inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-medium uppercase tracking-wider ${cfg.bg} ${cfg.text}`}>
      {cfg.label}
    </span>
  );
}

function typeMovementLabel(t) {
  return ({BUY:"Compra",SELL:"Venda",BONUS:"Bonificação",SUBSCRIPTION:"Subscrição",COME_COTAS:"Come-cotas",FULL_REDEMPTION:"Resgate"}[t]) || t;
}
function typeDistributionLabel(t) {
  return ({DIVIDEND:"Dividendo",INTEREST:"Juros",JCP:"JCP",SECURITIES_LENDING:"Aluguel"}[t]) || t;
}

function ActivityFeed({ items, hideSource }) {
  const groups = {};
  items.forEach(it => { (groups[it.d] = groups[it.d] || []).push(it); });
  const dates = Object.keys(groups).sort((a, b) => b.localeCompare(a));
  return (
    <div className="-mx-1">
      {dates.map(date => (
        <div key={date}>
          <div className="px-1 py-1.5 text-[10px] uppercase tracking-wider text-gray-500 font-medium sticky top-0">
            {fmtRelDate(date)} · <span className="text-gray-600 normal-case tracking-normal">{fmtDate(date)}</span>
          </div>
          {groups[date].map((it, i) => (
            <ActivityRow key={i} item={it} hideSource={hideSource} />
          ))}
        </div>
      ))}
    </div>
  );
}

  const isMovement = item.kind === "movement";

    ? fiById[item.fi]
    : (asset ? fiById[assetFi(asset)] : (acc ? fiById[acc.fi] : (card ? fiById[card.fi] : null)));

  const amtClass = item.amt < 0 ? "text-red-400" : "text-emerald-400";
  return (
    <div className="grid grid-cols-12 items-center gap-3 px-1 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800/40 transition-colors">

      <div className="col-span-5 flex items-center gap-2.5 min-w-0">

          {isMovement && asset && (
            <Fragment>
              <div className="flex items-center gap-2 text-[13px]">
                <span className="font-mono font-medium">{asset.ticker || asset.name}</span>
                <CountryFlag country={asset.country}/>
                <ClassBadge klass={asset.klass} size="xs"/>

              <div className="text-[11px] text-gray-500 truncate">
                <span className="money">{fmtNum(item.qty)} × {fmtMoney(item.price, item.ccy)}</span>

            </Fragment>
          )}
          {isDist && (
            <Fragment>
              <div className="flex items-center gap-2 text-[13px]">
                {asset ? (
                  <Fragment>
                    <span className="font-mono font-medium">{asset.ticker || asset.name}</span>
                    <CountryFlag country={asset.country}/>
                  </Fragment>
                ) : (
                  <span className="font-medium text-gray-400 italic">Sem ticker</span>
                )}
              </div>
              <div className="text-[11px] text-gray-500 truncate">{item.note || (asset ? asset.name : `via ${fi.short}`)}</div>

            <Fragment>
              <div className="text-[13px] font-medium truncate">{item.desc}</div>

/* ---------- FI Hub ---------- */

function FIHub({ fiId }) {
  const fi = fiById[fiId];
  if (!fi) return <NotFound />;

  const allAccs = ACCOUNTS.filter(a => a.fi === fiId);
  const investmentAccs = allAccs.filter(a => a.type === "investment");
  const checkingAccs   = allAccs.filter(a => a.type === "checking");
  const cards          = CARDS.filter(c => c.fi === fiId);
  const assets = assetsAtFi(fiId);
  const totalValue = assets.reduce((s, a) => s + a.qty * a.price * (a.ccy === "USD" ? PTAX : 1), 0);
  const fiAlloc = ALLOCATION_BY_FI.find(x => x.fi === fiId);
  const cardDebt = cards.reduce((s, c) => s + c.openInvoice * (c.currency === "USD" ? PTAX : 1), 0);
  const cashHere = checkingAccs.reduce((s, a) => s + a.balance * (a.currency === "USD" ? PTAX : 1), 0);
  const floatHere = investmentAccs.reduce((s, a) => s + a.balance * (a.currency === "USD" ? PTAX : 1), 0);

  const allClassesAtFi = {};
  assets.forEach(a => {
    const v = a.qty * a.price * (a.ccy === "USD" ? PTAX : 1);
    allClassesAtFi[a.klass] = (allClassesAtFi[a.klass] || 0) + v;
  });
  const klassRows = Object.entries(allClassesAtFi).sort((a, b) => b[1] - a[1]);

  const fiActivity = ACTIVITY.filter(it => {
    if (it.kind === "movement" && it.asset && assetFi(assetById[it.asset]) === fiId) return true;
    if (it.kind === "distribution" && it.fi === fiId) return true;
    if (it.kind === "transaction" && it.acc && accById[it.acc]?.fi === fiId) return true;
    if (it.kind === "transaction" && it.card && cardById[it.card]?.fi === fiId) return true;
    return false;
  });

  // Sum of everything at this FI
  const fiNetValue = totalValue + floatHere + cashHere - cardDebt;

  return (
    <div className="space-y-6">
      <Card padding="p-6">
        <div className="flex items-start gap-4">
          <FILogo fi={fiId} size="lg" />
          <div className="flex-1">
            <div className="flex items-center gap-2">
              <h1 className="text-2xl font-semibold">{fi.long}</h1>
              <CountryFlag country={fi.country}/>
            </div>
            <div className="text-[13px] text-gray-500 mt-0.5">{fi.short} · custodiante</div>
          </div>
          <div className="flex items-center gap-2">
            <button className="h-8 px-3 inline-flex items-center gap-1.5 rounded-lg text-[12px] bg-gray-100 dark:bg-gray-800 text-gray-300 hover:bg-gray-700 transition-colors">
              <Icon name="external-link" className="w-3.5 h-3.5"/> Abrir site
            </button>
          </div>
        </div>
        <div className="mt-6 grid grid-cols-2 lg:grid-cols-4 gap-3">
          <KpiTile label="Posição em ativos" value={fmtBRL(fiAlloc?.value || totalValue, { compact: true })} sub={`${fmtPct((fiAlloc?.value || totalValue) / TOTAL_INVEST, 1)} do portfólio`}/>
          <KpiTile label="Float em conta" value={fmtBRL(floatHere, { compact: true })} sub={`${investmentAccs.length} contas de investimento`}/>
          <KpiTile label="Caixa" value={fmtBRL(cashHere, { compact: true })} sub={`${checkingAccs.length} contas correntes`}/>
          <KpiTile label="Cartões abertos" value={cards.length ? fmtBRL(cardDebt, { compact: true }) : "—"} sub={`${cards.length} ${cards.length === 1 ? "cartão" : "cartões"}`} intent={cardDebt > 0 ? "negative" : undefined}/>
        </div>
      </Card>

      {/* Three columns: contas + cartões + composição */}
      <div className="grid grid-cols-12 gap-6">
        <Card className="col-span-12 lg:col-span-7">
          <SectionTitle action={<a href={`#/contas`} className="text-[11px] text-indigo-400 hover:text-indigo-300">Ver contas →</a>}>
            Contas em {fi.short}
          </SectionTitle>
          {allAccs.length === 0
            ? <div className="text-[12px] text-gray-500 italic py-2">Nenhuma conta cadastrada nesta instituição.</div>
            : (
              <div className="space-y-3">
                {investmentAccs.length > 0 && (
                  <Fragment>
                    <div className="text-[10px] uppercase tracking-wider text-gray-500 font-medium pl-2">Investimento</div>
                    {investmentAccs.map(a => <AccountRow key={a.id} acc={a} showAssetCount/>)}
                  </Fragment>
                )}
                {checkingAccs.length > 0 && (
                  <Fragment>
                    <div className="text-[10px] uppercase tracking-wider text-gray-500 font-medium pl-2 mt-3">Conta corrente</div>
                    {checkingAccs.map(a => <AccountRow key={a.id} acc={a} />)}
                  </Fragment>
                )}
              </div>
            )}

          {cards.length > 0 && (
            <div className="mt-5 pt-4 border-t border-gray-200 dark:border-gray-800">
              <div className="text-[10px] uppercase tracking-wider text-gray-500 font-medium pl-2 mb-2">Cartões de crédito</div>
              <div className="space-y-2">
                {cards.map(c => <CardRow key={c.id} card={c}/>)}
              </div>
            </div>
          )}
        </Card>

        <Card className="col-span-12 lg:col-span-5">
          <SectionTitle>Composição por classe</SectionTitle>
          {klassRows.length === 0
            ? <div className="text-[12px] text-gray-500 italic">Sem ativos nesta instituição.</div>
            : (
              <div className="space-y-2">
                {klassRows.map(([k, v]) => (
                  <div key={k} className="flex items-center gap-3">
                    <span className="w-1.5 h-5 rounded-full" style={{ background: KLASS[k].color }}/>
                    <span className="text-[13px] flex-1">{KLASS[k].label}</span>
                    <span className="text-[11px] text-gray-500 tnum w-14 text-right">{fmtPct(v / totalValue, 1)}</span>
                    <span className="text-[13px] tnum money w-24 text-right">{fmtBRL(v, { compact: true })}</span>
                  </div>
                ))}
              </div>
            )}
        </Card>
      </div>

      {assets.length > 0 && (
        <Card>
          <SectionTitle action={
            <div className="flex items-center gap-2">
              <button className="h-7 px-2 inline-flex items-center gap-1 rounded-md text-[11px] bg-gray-100 dark:bg-gray-800 text-gray-300 hover:bg-gray-700"><Icon name="filter" className="w-3 h-3"/> Filtrar</button>
              <a href="#/ativos" className="text-[11px] text-indigo-400 hover:text-indigo-300">Ver todos →</a>
            </div>
          }>
            Ativos em {fi.short} · {assets.length} ativos {investmentAccs.length > 1 && `· ${investmentAccs.length} contas`}
          </SectionTitle>
          <AssetTable assets={assets.slice(0, 12)} showAccount={investmentAccs.length > 1} />
        </Card>
      )}

      <Card>
        <SectionTitle>Atividade recente · {fi.short}</SectionTitle>
        {fiActivity.length === 0
          ? <div className="text-[12px] text-gray-500 italic py-4 text-center">Nenhuma atividade recente para esta instituição.</div>
          : <ActivityFeed items={fiActivity} />}
      </Card>
    </div>
  );
}

            const acc = accById[a.account];
            return (
              <tr key={a.id} className="border-t border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/30 transition-colors">

                      <div className="font-mono font-medium flex items-center gap-1.5">

                <td className="px-2 text-right">
                  <div className={`tnum money font-medium ${pl >= 0 ? "text-emerald-400" : "text-red-400"}`}>
                    {fmtMoney(pl, a.ccy, { sign: true })}

}

function AtivosPage() {
  const [search,    setSearch]    = useState("");
  const [klass,     setKlass]     = useState([]);    // multi
  const [country,   setCountry]   = useState([]);    // multi
  const [fi,        setFi]        = useState([]);    // multi
  const [grouping,  setGrouping]  = useState("none");
  const [showInact, setShowInact] = useState(false);
  // Row click navigates to full asset page (no slide-over here — use the page).
  const openAsset = (id) => { window.location.hash = `#/ativo/${id}`; };

  const filtered = useMemo(() => {
    let xs = ASSETS;
    if (!showInact) xs = xs.filter(a => a.is_active !== false);
    if (search.trim()) {
      const q = search.toLowerCase();
      xs = xs.filter(a => (a.ticker || "").toLowerCase().includes(q) || a.name.toLowerCase().includes(q));
    }
    if (klass.length)   xs = xs.filter(a => klass.includes(a.klass));
    if (country.length) xs = xs.filter(a => country.includes(a.country));
    if (fi.length)      xs = xs.filter(a => fi.includes(assetFi(a)));
    return xs;
  }, [search, klass, country, fi, showInact]);

  // Sorted by current value desc
  const sorted = useMemo(() => [...filtered].sort((a, b) => {
    const va = a.qty * a.price * (a.ccy === "USD" ? PTAX : 1);
    const vb = b.qty * b.price * (b.ccy === "USD" ? PTAX : 1);
    return vb - va;
  }), [filtered]);

  const grouped = useMemo(() => {
    if (grouping === "none") return null;
    const out = {};
    sorted.forEach(a => {
      const key =
        grouping === "klass"   ? a.klass :
        grouping === "fi"      ? assetFi(a) :
        grouping === "country" ? a.country :
        grouping === "account" ? a.account : "—";
      (out[key] = out[key] || []).push(a);
    });
    return Object.entries(out).sort((a, b) => {
      const va = a[1].reduce((s, x) => s + x.qty * x.price * (x.ccy === "USD" ? PTAX : 1), 0);
      const vb = b[1].reduce((s, x) => s + x.qty * x.price * (x.ccy === "USD" ? PTAX : 1), 0);
      return vb - va;
    });
  }, [sorted, grouping]);

  const totalValue = sorted.reduce((s, a) => s + a.qty * a.price * (a.ccy === "USD" ? PTAX : 1), 0);
  const totalCost  = sorted.reduce((s, a) => s + a.qty * a.avg   * (a.ccy === "USD" ? PTAX : 1), 0);
  const pl = totalValue - totalCost;
  const plPct = totalCost ? pl / totalCost : 0;

  const klassOpts = Object.entries(KLASS).map(([id, m]) => ({ id, label: m.label, color: m.color }));
  const countryOpts = [{ id: "BR", label: "🇧🇷 Brasil" }, { id: "US", label: "🇺🇸 EUA" }];
  const fiOpts = FIs.filter(f => assetsAtFi(f.id).length > 0).map(f => ({ id: f.id, label: f.short, color: f.color }));
  const groupingOpts = [
    { id: "none",    label: "Sem grupo" },
    { id: "klass",   label: "Classe" },
    { id: "fi",      label: "Custodiante" },
    { id: "country", label: "País" },
    { id: "account", label: "Conta" },
  ];

  return (
    <div className="space-y-6">
      <PageHeader
        title="Ativos"
        count={ASSETS.length}
        countLabel={`ativos · ${new Set(ASSETS.map(a => a.klass)).size} classes · ${new Set(ASSETS.map(assetFi)).size} custodiantes`}
        action={
          <div className="flex items-center gap-2">
            <button className="h-8 px-3 inline-flex items-center gap-1.5 rounded-lg text-[12px] bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
              <Icon name="external-link" className="w-3.5 h-3.5"/> Exportar
            </button>
            <button className="h-8 px-3 inline-flex items-center gap-1.5 rounded-lg text-[12px] bg-indigo-500 hover:bg-indigo-400 text-white transition-colors">
              <Icon name="plus" className="w-3.5 h-3.5"/> Novo ativo
            </button>
          </div>
        }
      />

      <Card padding="p-3" className="space-y-3">
        <div className="flex items-center gap-3 flex-wrap">
          <SearchInput value={search} onChange={setSearch} placeholder="Buscar por ticker ou nome…"/>
          <div className="flex-1"/>
          <ToggleSwitch on={showInact} onChange={setShowInact} label="Incluir zerados"/>
        </div>
        <div className="space-y-2 pt-3 border-t border-gray-200 dark:border-gray-800">
          <FilterGroup label="Classe">
            <MultiChips options={klassOpts} selected={klass} onChange={setKlass}/>
          </FilterGroup>
          <FilterGroup label="País">
            <MultiChips options={countryOpts} selected={country} onChange={setCountry}/>
          </FilterGroup>
          <FilterGroup label="Custodiante">
            <MultiChips options={fiOpts} selected={fi} onChange={setFi}/>
          </FilterGroup>
        </div>
        <div className="flex items-center gap-3 pt-3 border-t border-gray-200 dark:border-gray-800 flex-wrap">
          <span className="text-[10px] uppercase tracking-wider text-gray-500 font-medium min-w-[90px]">Agrupar por</span>
          <GroupingToggle value={grouping} onChange={setGrouping} options={groupingOpts}/>
          <div className="flex-1"/>
          <div className="text-[11px] text-gray-500">
            <span className="tnum">{sorted.length}</span> de <span className="tnum">{ASSETS.length}</span> ativos · valor total <span className="tnum money font-medium text-gray-700 dark:text-gray-300">{fmtBRL(totalValue, { compact: true })}</span> · P&L <span className={`tnum money font-medium ${pl >= 0 ? "text-emerald-400" : "text-red-400"}`}>{fmtBRL(pl, { sign: true, compact: true })}</span> ({fmtPct(plPct, 1, true)})
          </div>
        </div>
      </Card>

      {grouping === "none" ? (
        <Card padding="p-3">
          <AtivosTable assets={sorted} onSelect={openAsset}/>
        </Card>
      ) : (
        <div className="space-y-4">
          {grouped.map(([key, items]) => {
            const groupValue = items.reduce((s, a) => s + a.qty * a.price * (a.ccy === "USD" ? PTAX : 1), 0);
            const label = grouping === "klass"   ? KLASS[key]?.label
                        : grouping === "fi"      ? fiById[key]?.short
                        : grouping === "country" ? (key === "BR" ? "🇧🇷 Brasil" : key === "US" ? "🇺🇸 EUA" : key)
                        : grouping === "account" ? accById[key]?.name
                        : key;
            const color = grouping === "klass" ? KLASS[key]?.color : grouping === "fi" ? fiById[key]?.color : null;
            return (
              <Card key={key} padding="p-3">
                <div className="flex items-center gap-2 px-2 py-1.5 mb-2 border-b border-gray-200 dark:border-gray-800">
                  {color && <span className="w-1.5 h-5 rounded-full" style={{ background: color }} />}
                  <span className="font-semibold text-[13px]">{label}</span>
                  <span className="text-[10px] text-gray-500 tnum">· {items.length}</span>
                  <div className="flex-1"/>
                  <span className="tnum money font-medium text-[12px]">{fmtBRL(groupValue, { compact: true })}</span>
                  <span className="text-[10px] text-gray-500 tnum w-12 text-right">{fmtPct(groupValue / totalValue, 1)}</span>
                </div>
                <AtivosTable assets={items} onSelect={openAsset} dense/>
              </Card>
            );
          })}
        </div>
      )}
    </div>
  );
}

function AssetDetailPanel({ assetId }) {

        <KpiTile label="Preço atual" value={fmtMoney(a.price, a.ccy)}/>

      <Card padding="p-3">

        }

/* ---------- Lançamentos page ---------- */

function LancamentosPage() {
  const [types,    setTypes]    = useState([]);
  const [search,   setSearch]   = useState("");
  const [showInact,setShowInact] = useState(false);
  const [selected, setSelected] = useState(null); // movement id

  const filtered = useMemo(() => {
    let xs = MOVEMENTS;
    if (types.length) xs = xs.filter(m => types.includes(m.type));
    if (search.trim()) {
      const q = search.toLowerCase();
      xs = xs.filter(m => {
        const a = assetById[m.asset];
        return (a?.ticker || "").toLowerCase().includes(q) || (a?.name || "").toLowerCase().includes(q);
      });
    }
    return xs;
  }, [types, search, showInact]);

  const sorted = useMemo(() => [...filtered].sort((a, b) => b.d.localeCompare(a.d)), [filtered]);
  const grouped = groupByYM(sorted);

  const totalNet = sorted.reduce((s, m) => s + m.net * m.fxRate, 0);

  const typeOpts = [
    { id: "BUY",             label: "Compra",        color: "#3b82f6" },
    { id: "SELL",            label: "Venda",         color: "#ef4444" },
    { id: "BONUS",           label: "Bonificação",   color: "#22c55e" },
    { id: "SUBSCRIPTION",    label: "Subscrição",    color: "#8b5cf6" },
    { id: "COME_COTAS",      label: "Come-cotas",    color: "#f59e0b" },
    { id: "FULL_REDEMPTION", label: "Resgate Total", color: "#14b8a6" },
  ];

  return (
    <div className="space-y-6">
      <PageHeader
        title="Lançamentos"
        count={MOVEMENTS.length}
        countLabel={`movimentações de ativos · ${new Set(MOVEMENTS.map(m => m.asset)).size} ativos`}
      />

      <QuickAddBar
        placeholder="Lançamento rápido — ex: 'compra 100 PETR4 a 38,90 hoje' ou 'venda VALE3 100 cotas'"
      />

      <Card padding="p-3" className="space-y-3">
        <div className="flex items-center gap-3 flex-wrap">
          <SearchInput value={search} onChange={setSearch} placeholder="Ativo (ticker ou nome)…"/>
          <DateRangeButton/>
          <div className="flex-1"/>
          <ToggleSwitch on={showInact} onChange={setShowInact} label="Incluir inativos"/>
        </div>
        <div className="space-y-2 pt-3 border-t border-gray-200 dark:border-gray-800">
          <FilterGroup label="Tipo">

function ProventosPage() {
  const [types,  setTypes]  = useState([]);
  const [view,   setView]   = useState("month"); // month | asset
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null); // distribution id

  const filtered = useMemo(() => {
    let xs = DISTRIBUTIONS;
    if (types.length) xs = xs.filter(d => types.includes(d.type));
    if (search.trim()) {
      const q = search.toLowerCase();
      xs = xs.filter(d => {
        const a = d.asset ? assetById[d.asset] : null;
        return (a?.ticker || "").toLowerCase().includes(q) || (a?.name || "").toLowerCase().includes(q) || fiById[d.fi]?.short.toLowerCase().includes(q);
      });
    }
    return xs;
  }, [types, search]);

  const sorted = useMemo(() => [...filtered].sort((a, b) => b.d.localeCompare(a.d)), [filtered]);
  const grouped = groupByYM(sorted);

  const totalNetBRL = sorted.reduce((s, d) => s + d.net * d.fxRate, 0);
  const totalGrossBRL = sorted.reduce((s, d) => s + d.gross * d.fxRate, 0);
  const totalTaxBRL = sorted.reduce((s, d) => s + d.tax * d.fxRate, 0);

  // By type breakdown
  const byType = {};
  sorted.forEach(d => { byType[d.type] = (byType[d.type] || 0) + d.net * d.fxRate; });

  // By asset breakdown
  const byAsset = {};
  sorted.forEach(d => {
    const k = d.asset || `__noticker_${d.fi}`;
    (byAsset[k] = byAsset[k] || { id: d.asset, fi: d.fi, total: 0, count: 0 }).total += d.net * d.fxRate;
    byAsset[k].count++;
  });
  const assetRows = Object.values(byAsset).sort((a, b) => b.total - a.total);

  const typeOpts = [
    { id: "DIVIDEND",            label: "Dividendo", color: "#22c55e" },
    { id: "INTEREST",            label: "Juros",     color: "#3b82f6" },
    { id: "JCP",                 label: "JCP",       color: "#f59e0b" },
    { id: "SECURITIES_LENDING",  label: "Aluguel",   color: "#8b5cf6" },
  ];

  return (
    <div className="space-y-6">
      <PageHeader
        title="Proventos"
        count={DISTRIBUTIONS.length}
        countLabel={`distribuições · ${new Set(DISTRIBUTIONS.filter(d => d.asset).map(d => d.asset)).size} ativos pagam`}
      />

      <div className="grid grid-cols-12 gap-4">
        <Card className="col-span-12 lg:col-span-5">
          <SectionTitle>Total recebido</SectionTitle>
          <div className="text-3xl font-semibold tnum money">{fmtBRL(totalNetBRL)}</div>
          <div className="text-[11px] text-gray-500 mt-1">
            Bruto <span className="tnum money text-gray-300">{fmtBRL(totalGrossBRL, { compact: true })}</span> · IR retido <span className="tnum money text-amber-400">{fmtBRL(totalTaxBRL, { compact: true })}</span>
          </div>
        </Card>
        <Card className="col-span-12 lg:col-span-7">
          <SectionTitle>Por tipo</SectionTitle>
          <div className="grid grid-cols-4 gap-2">
            {typeOpts.map(t => {
              const v = byType[t.id] || 0;
              return (
                <div key={t.id} className="px-3 py-2 rounded-lg bg-gray-50 dark:bg-gray-800/40 border border-gray-200 dark:border-gray-800">
                  <div className="flex items-center gap-1.5 text-[10px] uppercase tracking-wider text-gray-500">
                    <span className="w-1.5 h-1.5 rounded-full" style={{ background: t.color }}/>
                    {t.label}
                  </div>
                  <div className="mt-1 text-sm font-semibold tnum money">{fmtBRL(v, { compact: true })}</div>
                  <div className="text-[10px] text-gray-500 tnum">{totalNetBRL ? fmtPct(v / totalNetBRL, 0) : "—"}</div>
                </div>
              );
            })}
          </div>
        </Card>
      </div>

      <Card padding="p-3" className="space-y-3">
        <div className="flex items-center gap-3 flex-wrap">
          <SearchInput value={search} onChange={setSearch} placeholder="Ativo, ticker, instituição…"/>

          <div className="flex-1"/>
          <span className="text-[10px] uppercase tracking-wider text-gray-500 font-medium">Visão</span>

        </div>
        <div className="space-y-2 pt-3 border-t border-gray-200 dark:border-gray-800">
          <FilterGroup label="Tipo">
            <MultiChips options={typeOpts} selected={types} onChange={setTypes}/>

      </Card>

      {view === "month" ? (
        <Card padding="p-3">
          <div className="overflow-x-auto -mx-1">
            <table className="w-full text-[12px]">
              <thead>
                <tr className="text-[10px] uppercase tracking-wider text-gray-500">
                  <th className="text-left font-medium px-2 py-2">Data</th>
                  <th className="text-left font-medium px-2 py-2">Tipo</th>
                  <th className="text-left font-medium px-2 py-2">Ativo / IF</th>
                  <th className="text-right font-medium px-2 py-2">Bruto</th>
                  <th className="text-right font-medium px-2 py-2">IR</th>
                  <th className="text-right font-medium px-2 py-2">Líquido</th>

              </thead>
              <tbody>
                {grouped.map(g => (
                  <Fragment key={g.ym}>
                    <tr><td colSpan={7} className="p-0"><MonthHeader ym={g.ym}/></td></tr>
                    {g.items.map(d => {
                      const a = d.asset ? assetById[d.asset] : null;
                      const fi = fiById[d.fi];
                      const meta = DISTRIBUTION_NOTES[d.id];

                      return (
                        <tr key={d.id}

                              {hasMeta && (
                                <span className="inline-flex items-center gap-0.5 text-[10px] text-amber-400" title="Tem notas / anexos">
                                  {meta.notes && <Icon name="file-text" className="w-3 h-3"/>}
                                  {meta.files.length > 0 && <Fragment><Icon name="paperclip" className="w-3 h-3"/><span className="tnum">{meta.files.length}</span></Fragment>}
                                </span>
                              )}
                            </div>
                          </td>
                          <td className="px-2">
                            <div className="flex items-center gap-2">
                              <FILogo fi={fi.id} size="sm"/>
                              <div className="min-w-0">
                                {a ? (
                                  <Fragment>
                                    <div className="font-mono font-medium flex items-center gap-1.5">{a.ticker || a.name} <CountryFlag country={a.country}/></div>
                                    <div className="text-[11px] text-gray-500 truncate max-w-[240px]">{a.name}</div>

                                ) : (
                                  <Fragment>

function MovimentacoesPage() {
  const [sources,  setSources]  = useState([]); // account ids + card ids
  const [cats,     setCats]     = useState([]);
  const [search,   setSearch]   = useState("");

  const filtered = useMemo(() => {
    let xs = TRANSACTIONS;
    if (sources.length) xs = xs.filter(t => sources.includes(t.acc) || sources.includes(t.card));
    if (cats.length)    xs = xs.filter(t => cats.includes(t.cat));
    if (search.trim()) {
      const q = search.toLowerCase();
      xs = xs.filter(t => t.desc.toLowerCase().includes(q));
    }
    return xs;
  }, [sources, cats, search]);

  const sorted = useMemo(() => [...filtered].sort((a, b) => b.d.localeCompare(a.d)), [filtered]);
  const grouped = groupByYM(sorted);

  const inflowBRL  = sorted.filter(t => t.amt > 0).reduce((s, t) => s + t.amt * (t.ccy === "USD" ? PTAX : 1), 0);
  const outflowBRL = sorted.filter(t => t.amt < 0).reduce((s, t) => s + t.amt * (t.ccy === "USD" ? PTAX : 1), 0);
  const unreconciled = sorted.filter(t => !t.reconciled).length;

  const sourceOpts = [
    ...ACCOUNTS.filter(a => a.type === "checking").map(a => ({ id: a.id, label: a.name, color: fiById[a.fi].color })),
    ...CARDS.map(c => ({ id: c.id, label: c.name, color: fiById[c.fi].color })),
  ];
  const catOpts = CATEGORIES.map(c => ({ id: c.id, label: c.name, color: c.color }));

  return (
    <div className="space-y-6">
      <PageHeader
        title="Movimentações"
        count={TRANSACTIONS.length}
        countLabel={`transações · ${new Set(TRANSACTIONS.map(t => t.acc || t.card)).size} fontes`}

          <button className="h-8 px-3 inline-flex items-center gap-1.5 rounded-lg text-[12px] bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
            <Icon name="file-text" className="w-3.5 h-3.5"/> Reconciliar
          </button>
        }
      />

      <div className="grid grid-cols-12 gap-4">
        <Card className="col-span-12 lg:col-span-3">
          <SectionTitle>Entradas · período</SectionTitle>
          <div className="text-2xl font-semibold tnum money text-emerald-400">{fmtBRL(inflowBRL, { compact: true })}</div>
          <div className="text-[11px] text-gray-500 mt-1"><span className="tnum">{sorted.filter(t => t.amt > 0).length}</span> transações</div>
        </Card>
        <Card className="col-span-12 lg:col-span-3">
          <SectionTitle>Saídas · período</SectionTitle>
          <div className="text-2xl font-semibold tnum money text-red-400">{fmtBRL(outflowBRL, { compact: true })}</div>

        </Card>
        <Card className="col-span-12 lg:col-span-3">
          <SectionTitle>Resultado</SectionTitle>
          <div className={`text-2xl font-semibold tnum money ${inflowBRL + outflowBRL >= 0 ? "text-emerald-400" : "text-red-400"}`}>{fmtBRL(inflowBRL + outflowBRL, { compact: true, sign: true })}</div>

                        </td>
                        <td className={`px-2 text-right tnum money font-medium ${isIncome ? "text-emerald-400" : ""}`}>{fmtMoney(t.amt, t.ccy, { sign: true })}</td>
                        <td className="px-2 text-center">
                          {t.reconciled
                            ? <Icon name="check" className="w-3.5 h-3.5 text-emerald-500 mx-auto"/>
                            : <span className="inline-block w-1.5 h-1.5 rounded-full bg-amber-400" title="Não reconciliada"/>
                          }
                        </td>
                        <td className="px-2 text-gray-500"><Icon name="more-horizontal" className="w-4 h-4"/></td>
                      </tr>
                    );
                  })}
                </Fragment>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

/* ---------- Composers ---------- */

const TODAY_ISO = "2026-05-04";
const num = (s) => parseFloat(String(s ?? "").replace(/\./g, "").replace(",", ".")) || 0;

const MV_TYPE_CFG = {
  BUY:             { label: "Compra",        sign: -1, qty: true,  price: true,  fee: true,  tax: false, hint: "compra adiciona à posição" },
  SELL:            { label: "Venda",         sign:  1, qty: true,  price: true,  fee: true,  tax: false, hint: "venda reduz a posição" },
  BONUS:           { label: "Bonificação",   sign:  0, qty: true,  price: false, fee: false, tax: false, hint: "ações grátis · sem custo" },
  SUBSCRIPTION:    { label: "Subscrição",    sign: -1, qty: true,  price: true,  fee: true,  tax: false, hint: "exercício de subscrição" },
  COME_COTAS:      { label: "Come-cotas",    sign: -1, qty: false, price: false, fee: false, tax: true,  hint: "imposto semestral · BR" },
  FULL_REDEMPTION: { label: "Resgate Total", sign:  1, qty: true,  price: true,  fee: false, tax: false, hint: "vencimento ou liquidação" },
};

function MovementComposer({ prefill = {}, onClose }) {
  const [type,    setType]    = useState(prefill.type    || "BUY");
  const [date,    setDate]    = useState(prefill.date    || TODAY_ISO);
  const [assetId, setAssetId] = useState(prefill.asset   || "");
  const [qty,     setQty]     = useState(prefill.qty     || "");
  const [price,   setPrice]   = useState(prefill.price   || "");
  const [fee,     setFee]     = useState(prefill.fee     || "");
  const [tax,     setTax]     = useState(prefill.tax     || "");
  const [notes,   setNotes]   = useState(prefill.notes   || "");

  const cfg = MV_TYPE_CFG[type];
  const a = assetId ? assetById[assetId] : null;
  const ccy = a?.ccy || "BRL";
  const fxRate = ccy === "USD" ? PTAX : 1.0;

  const qN = num(qty), pN = num(price), feeN = num(fee), tN = num(tax);
  let net = 0;
  if (type === "BUY")             net = -(qN * pN + feeN);
  else if (type === "SELL")       net =   qN * pN - feeN;
  else if (type === "BONUS")      net = 0;
  else if (type === "SUBSCRIPTION")    net = -(qN * pN + feeN);
  else if (type === "COME_COTAS")      net = -tN;
  else if (type === "FULL_REDEMPTION") net =   qN * pN;

  const currentQty = a?.qty || 0;
  let newQty = currentQty;
  if (type === "BUY" || type === "BONUS" || type === "SUBSCRIPTION") newQty = currentQty + qN;
  else if (type === "SELL" || type === "FULL_REDEMPTION")            newQty = currentQty - qN;

  const acc = a ? accById[a.account] : null;
  const fi  = a ? fiById[assetFi(a)] : null;
  const inactive = a && a.is_active === false;

  const valid = !!a && (cfg.qty ? qN > 0 : true) && (cfg.price ? pN > 0 : true) && (cfg.tax ? tN > 0 : true);

  return (
    <Fragment>
      <ModalHeader title="Novo Lançamento" subtitle="Movimento de posição em ativo" onClose={onClose}/>
      <div className="px-6 py-5 overflow-y-auto flex-1 scrollbar-thin">
        {/* Type picker */}
        <Field label="Tipo">
          <div className="grid grid-cols-3 gap-2">
            {Object.entries(MV_TYPE_CFG).map(([id, c]) => (
              <button key={id} onClick={() => setType(id)}
                className={`px-3 py-2.5 rounded-lg text-left border transition-colors
                  ${type === id
                    ? "bg-indigo-500/15 border-indigo-500"
                    : "bg-gray-50 dark:bg-gray-800/30 border-gray-200 dark:border-gray-800 hover:border-gray-400 dark:hover:border-gray-700"}`}>
                <div className={`text-[12px] font-semibold ${type === id ? "text-indigo-700 dark:text-indigo-300" : "text-gray-700 dark:text-gray-300"}`}>{c.label}</div>
                <div className="text-[10px] text-gray-500 mt-0.5">{c.hint}</div>
              </button>
            ))}
          </div>
        </Field>

        {/* Form fields */}
        <div className="mt-5 grid grid-cols-2 gap-4">
          <Field label="Data do evento">
            <input type="date" value={date} onChange={e => setDate(e.target.value)} className={inputCls}/>
          </Field>
          <Field label="Ativo">
            <select value={assetId} onChange={e => setAssetId(e.target.value)} className={inputCls}>
              <option value="">Selecione…</option>
              {ASSETS.map(x => <option key={x.id} value={x.id}>{x.ticker ? `${x.ticker} · ${x.name}` : x.name}</option>)}
            </select>
          </Field>
          {cfg.qty && (
            <Field label="Quantidade">
              <input value={qty} onChange={e => setQty(e.target.value)} placeholder="ex: 100" className={inputCls}/>
            </Field>
          )}
          {cfg.price && (
            <Field label={`Preço unitário · ${ccy}`}>
              <input value={price} onChange={e => setPrice(e.target.value)} placeholder="ex: 38,90" className={inputCls}/>
            </Field>
          )}
          {cfg.fee && (
            <Field label={`Taxa · ${ccy}`} hint="opcional">
              <input value={fee} onChange={e => setFee(e.target.value)} placeholder="ex: 12,40" className={inputCls}/>
            </Field>
          )}
          {cfg.tax && (
            <Field label={`Imposto retido · ${ccy}`}>
              <input value={tax} onChange={e => setTax(e.target.value)} placeholder="ex: 384,00" className={inputCls}/>
            </Field>
          )}
        </div>

        {/* Inactive warning */}
        {inactive && (
          <div className="mt-4 p-3 rounded-lg bg-amber-500/10 border border-amber-500/30 text-[12px] text-amber-300">
            <Icon name="circle-dot" className="w-3.5 h-3.5 inline mr-1"/> Esse ativo está marcado como zerado. Confirme antes de lançar.
          </div>
        )}

        {/* Live preview */}
        {a && (
          <div className="mt-5">
            <PreviewBlock>
              <PreviewRow label="Net" value={fmtMoney(net, ccy, { sign: true })} valueClass={`text-base ${net < 0 ? "text-red-400" : net > 0 ? "text-emerald-400" : "text-gray-500"}`}/>
              {cfg.qty && (
                <div className="flex items-center justify-between text-[12px] text-gray-400">
                  <span className="text-gray-500">Posição</span>
                  <span className="tnum">
                    {fmtNum(currentQty, currentQty < 100 ? 2 : 0)} → <span className={`font-semibold ${newQty > currentQty ? "text-emerald-400" : newQty < currentQty ? "text-red-400" : "text-gray-300"}`}>{fmtNum(newQty, newQty < 100 ? 2 : 0)}</span> {a.ticker || a.name}
                  </span>
                </div>
              )}
              {net !== 0 && (
                <div className="flex items-center justify-between text-[12px] text-gray-400">
                  <span className="text-gray-500">Cash side</span>
                  <span className="text-gray-300">{net < 0 ? "Debita" : "Credita"} <a href={`#/conta/${acc.id}`} onClick={onClose} className="hover:text-indigo-400 underline-offset-2 hover:underline">{acc.name}</a></span>
                </div>
              )}
              {ccy === "USD" && (
                <div className="flex items-center justify-between text-[12px] text-gray-500">
                  <span>FX</span>
                  <span className="tnum">R$ {fxRate.toFixed(4)} · {fmtBRL(net * fxRate, { sign: true, compact: true })}</span>
                </div>
              )}
            </PreviewBlock>
          </div>
        )}

        {/* Notes */}
        <div className="mt-5">
          <Field label="Notas" hint="opcional · ⌘V cola imagem">
            <textarea value={notes} onChange={e => setNotes(e.target.value)} rows={2} placeholder="ex: tese, motivo da compra, link pra notícia…" className={inputClsArea}/>
          </Field>
        </div>
      </div>
      <ModalFooter onCancel={onClose} onSave={onClose} saveDisabled={!valid}
        leftSlot={<span className="text-[11px] text-gray-500"><kbd className="px-1.5 py-0.5 mx-0.5 rounded bg-gray-200 dark:bg-gray-800 text-[10px] font-mono">⌘↵</kbd> salvar · <kbd className="px-1.5 py-0.5 mx-0.5 rounded bg-gray-200 dark:bg-gray-800 text-[10px] font-mono">esc</kbd> fechar</span>}
      />
    </Fragment>
  );
}

function TransactionComposer({ prefill = {}, onClose }) {

  const [catId,  setCatId]  = useState("");
  const [notes,  setNotes]  = useState("");

  const acc = accById[accId];
  const ccy = acc?.currency || "BRL";
  const amtN = num(amount);
  const signedAmt = direction === "in" ? amtN : -amtN;
  const fxRate = ccy === "USD" ? PTAX : 1.0;

  const checkings = ACCOUNTS.filter(x => x.type === "checking");
  const valid = !!acc && amtN > 0 && desc.trim().length > 0;

  // Suggested categories given description heuristic
  const suggestedCat = useMemo(() => {
    const d = desc.toLowerCase();
    if (/salário|salario|consultoria|cliente/.test(d)) return "renda";
    if (/mercado|hortifruti|carrefour|pão de açúcar/.test(d)) return "mercado";
    if (/restaur|sushi|maní|cafe|cinema/.test(d)) return "restaurante";
    if (/uber|99|taxi|posto|gasolina/.test(d)) return "transporte";
    if (/luz|energia|internet|vivo|claro|aluguel/.test(d)) return "casa";
    if (/spotify|netflix|notion|apple|google/.test(d)) return "tecnologia";
    if (/farmacia|farmácia|hospital|consulta/.test(d)) return "saude";
    return null;
  }, [desc]);
  useEffect(() => { if (suggestedCat && !catId) setCatId(suggestedCat); }, [suggestedCat]);

  return (
    <Fragment>
      <ModalHeader title="Nova Movimentação" subtitle="Cash flow em conta corrente" onClose={onClose}/>

              className={`px-3 h-8 text-[12px] font-medium rounded-md transition-colors ${direction === "in" ? "bg-emerald-500/15 text-emerald-400" : "text-gray-500"}`}>
              Entrada · receita
            </button>
          </div>
        </Field>

        <div className="mt-5 grid grid-cols-2 gap-4">
          <Field label="Conta">
            <select value={accId} onChange={e => setAccId(e.target.value)} className={inputCls}>
              {checkings.map(c => <option key={c.id} value={c.id}>{c.name} · {c.currency}</option>)}
            </select>
          </Field>
          <Field label="Data">
            <input type="date" value={date} onChange={e => setDate(e.target.value)} className={inputCls}/>
          </Field>
          <Field label="Descrição" span={2}>
            <input value={desc} onChange={e => setDesc(e.target.value)} placeholder="ex: Salário consultoria · ou · Mercado · Pão de Açúcar" className={inputCls.replace("tnum","")}/>

              <option value="">Sem categoria</option>
              {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </Field>
        </div>

        {suggestedCat && (
          <div className="mt-3 text-[11px] text-indigo-400 flex items-center gap-1.5">
            <Icon name="sparkles" className="w-3 h-3"/> sugestão por descrição: <span className="font-medium">{catById[suggestedCat]?.name}</span>
          </div>
        )}

        {amtN > 0 && (
          <div className="mt-5">
            <PreviewBlock>
              <PreviewRow label="Net" value={fmtMoney(signedAmt, ccy, { sign: true })} valueClass={`text-base ${signedAmt < 0 ? "text-red-400" : "text-emerald-400"}`}/>

                <span className="text-gray-300">{acc.name}</span>

        <div className="mt-5">

/* ---------- Orçamento page (categories × months grid) ---------- */

const MONTHS_PT = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

function OrcamentoPage() {
  const year = 2026;
  const currentMonth = 4; // May 2026 is index 4 (0-based)

  // Only categories with a target
  const cats = CATEGORIES.filter(c => BUDGET_TARGETS[c.id] != null);

  const get = (catId, monthIdx) => {
    const ym = `${year}-${String(monthIdx + 1).padStart(2, "0")}`;
    return BUDGET_ACTUALS[ym]?.[catId] || 0;
  };

  // YTD per category
  const ytdByCat = {};
  cats.forEach(c => {
    let total = 0;
    for (let i = 0; i <= currentMonth; i++) total += get(c.id, i);
    ytdByCat[c.id] = total;
  });

  // Targets
  const targetMonth = cats.reduce((s, c) => s + BUDGET_TARGETS[c.id], 0);
  const targetYTD   = targetMonth * (currentMonth + 1);
  const totalSpentYTD = Object.values(ytdByCat).reduce((s, v) => s + v, 0);
  const ytdUsedPct = targetYTD ? totalSpentYTD / targetYTD : 0;

  // Current month status
  const currentMonthSpent = cats.reduce((s, c) => s + get(c.id, currentMonth), 0);
  const currentMonthPct = targetMonth ? currentMonthSpent / targetMonth : 0;

  // Status counts (current month)
  let over = 0, near = 0, ok = 0;
  cats.forEach(c => {
    const v = get(c.id, currentMonth);
    const t = BUDGET_TARGETS[c.id];
    const r = v / t;
    if (r > 1) over++;
    else if (r > 0.85) near++;
    else if (v > 0) ok++;
  });

  // Top spending category — current month
  const topCatRow = [...cats].sort((a, b) => get(b.id, currentMonth) - get(a.id, currentMonth))[0];

  return (
    <div className="space-y-6">
      <PageHeader
        title="Orçamento"
        count={year}
        countLabel={`· ${MONTHS_PT[currentMonth]} é o mês atual`}
        action={
          <div className="flex items-center gap-2">
            <button className="h-8 px-3 inline-flex items-center gap-1.5 rounded-lg text-[12px] bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
              <Icon name="settings" className="w-3.5 h-3.5"/> Editar metas
            </button>
            <button className="h-8 px-3 inline-flex items-center gap-1.5 rounded-lg text-[12px] bg-indigo-500 hover:bg-indigo-400 text-white transition-colors">
              <Icon name="plus" className="w-3.5 h-3.5"/> Nova categoria
            </button>
          </div>
        }
      />

      {/* KPI strip */}
      <div className="grid grid-cols-12 gap-4">
        <Card className="col-span-12 lg:col-span-4">
          <SectionTitle action={<span className="text-[11px] text-gray-500 tnum">{currentMonth + 1} de 12 meses</span>}>YTD · Gasto vs meta</SectionTitle>
          <div className="flex items-baseline gap-2">
            <div className="text-3xl font-semibold tnum money">{fmtBRL(totalSpentYTD, { compact: true })}</div>
            <div className="text-[12px] text-gray-500">de <span className="tnum money">{fmtBRL(targetYTD, { compact: true })}</span></div>
          </div>
          <div className="mt-2"><HBar value={Math.min(totalSpentYTD, targetYTD)} max={targetYTD} color={ytdUsedPct > 1 ? "#ef4444" : ytdUsedPct > 0.9 ? "#f59e0b" : "#22c55e"} height={8}/></div>
          <div className="mt-2 text-[11px] text-gray-500"><span className={`tnum font-medium ${ytdUsedPct > 1 ? "text-red-400" : ytdUsedPct > 0.9 ? "text-amber-400" : "text-emerald-400"}`}>{fmtPct(ytdUsedPct, 1)}</span> do orçamento usado</div>
        </Card>

        <Card className="col-span-12 lg:col-span-4">
          <SectionTitle>{MONTHS_PT[currentMonth]} · este mês</SectionTitle>
          <div className="flex items-baseline gap-2">
            <div className="text-3xl font-semibold tnum money">{fmtBRL(currentMonthSpent, { compact: true })}</div>
            <div className="text-[12px] text-gray-500">de <span className="tnum money">{fmtBRL(targetMonth, { compact: true })}</span></div>
          </div>
          <div className="mt-2"><HBar value={Math.min(currentMonthSpent, targetMonth)} max={targetMonth} color={currentMonthPct > 1 ? "#ef4444" : currentMonthPct > 0.9 ? "#f59e0b" : "#22c55e"} height={8}/></div>
          {topCatRow && (
            <div className="mt-2 text-[11px] text-gray-500 flex items-center gap-1.5">
              maior gasto: <span className="inline-flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full" style={{ background: topCatRow.color }}/><span className="text-gray-300 font-medium">{topCatRow.name}</span></span> · <span className="tnum money font-medium text-gray-300">{fmtBRL(get(topCatRow.id, currentMonth), { compact: true })}</span>
            </div>
          )}
        </Card>

        <Card className="col-span-12 lg:col-span-4">
          <SectionTitle>Status · {MONTHS_PT[currentMonth]}</SectionTitle>
          <div className="grid grid-cols-3 gap-3">
            <div className="text-center">
              <div className="text-2xl font-semibold tnum text-emerald-400">{ok}</div>
              <div className="text-[10px] uppercase tracking-wider text-gray-500 mt-1">No verde</div>
            </div>
            <div className="text-center">
              <div className="text-2xl font-semibold tnum text-amber-400">{near}</div>
              <div className="text-[10px] uppercase tracking-wider text-gray-500 mt-1">Próximo limite</div>
            </div>
            <div className="text-center">
              <div className="text-2xl font-semibold tnum text-red-400">{over}</div>
              <div className="text-[10px] uppercase tracking-wider text-gray-500 mt-1">Estourado</div>
            </div>
          </div>
          <div className="mt-3 text-[11px] text-gray-500 text-center">de {cats.length} categorias com meta</div>
        </Card>
      </div>

      {/* The grid */}
      <Card padding="p-3">
        <SectionTitle action={
          <div className="flex items-center gap-2 text-[11px] text-gray-500">
            <span className="inline-flex items-center gap-1"><span className="w-2 h-2 rounded-sm bg-emerald-500"/>OK</span>
            <span className="inline-flex items-center gap-1"><span className="w-2 h-2 rounded-sm bg-amber-500"/>Próximo</span>
            <span className="inline-flex items-center gap-1"><span className="w-2 h-2 rounded-sm bg-red-500"/>Estourou</span>
          </div>
        }>
          {year} · categorias × meses
        </SectionTitle>
        <div className="overflow-x-auto -mx-1">
          <table className="w-full text-[11px]" style={{ borderCollapse: "separate", borderSpacing: 0 }}>
            <thead>
              <tr>
                <th className="text-left font-medium px-2 py-2 sticky left-0 bg-white dark:bg-gray-900 z-10 min-w-[140px]">
                  <span className="text-[10px] uppercase tracking-wider text-gray-500">Categoria</span>
                </th>
                {MONTHS_PT.map((m, i) => (
                  <th key={i} className={`text-center font-medium px-1 py-2 text-[10px] uppercase tracking-wider min-w-[68px]
                    ${i === currentMonth ? "text-indigo-400" : "text-gray-500"}
                    ${i > currentMonth ? "opacity-40" : ""}`}>
                    {m}
                  </th>
                ))}
                <th className="text-center font-medium px-2 py-2 text-[10px] uppercase tracking-wider text-gray-500 min-w-[90px] bg-gray-50 dark:bg-gray-800/40">YTD</th>
                <th className="text-right font-medium px-2 py-2 text-[10px] uppercase tracking-wider text-gray-500 min-w-[90px]">Meta · mês</th>
              </tr>
            </thead>
            <tbody>
              {cats.map(c => {
                const target = BUDGET_TARGETS[c.id];
                return (
                  <tr key={c.id} className="border-t border-gray-100 dark:border-gray-800 hover:bg-gray-50/50 dark:hover:bg-gray-800/20">
                    <td className="px-2 py-2 sticky left-0 bg-white dark:bg-gray-900 z-10 border-t border-gray-100 dark:border-gray-800">
                      <div className="flex items-center gap-2">
                        <span className="w-1.5 h-5 rounded-full" style={{ background: c.color }}/>
                        <span className="font-medium">{c.name}</span>
                      </div>
                    </td>
                    {MONTHS_PT.map((_, i) => {
                      const v = get(c.id, i);
                      const future = i > currentMonth;
                      const pct = v / target;
                      const fillColor = pct > 1 ? "#ef4444" : pct > 0.85 ? "#f59e0b" : c.color;
                      const textColor = pct > 1 ? "text-red-400" : pct > 0.85 ? "text-amber-400" : v > 0 ? "text-gray-300" : "text-gray-600";
                      const isCurrent = i === currentMonth;
                      return (
                        <td key={i} className={`px-1 py-1.5 text-center align-top ${future ? "opacity-30" : ""} ${isCurrent ? "bg-indigo-500/5" : ""}`}>
                          {v > 0 ? (
                            <Fragment>
                              <div className={`tnum font-medium ${textColor}`}>{fmtBRL(v, { compact: true })}</div>
                              <div className="mt-1 mx-auto" style={{ width: 44 }}>
                                <HBar value={Math.min(v, target)} max={target} color={fillColor} height={3}/>
                              </div>
                            </Fragment>
                          ) : (
                            <span className="text-gray-700 dark:text-gray-700 text-[10px]">{future ? "" : "—"}</span>
                          )}
                        </td>
                      );
                    })}
                    <td className="px-2 py-1.5 text-center align-top bg-gray-50 dark:bg-gray-800/40">
                      <div className="tnum font-medium text-gray-700 dark:text-gray-200">{fmtBRL(ytdByCat[c.id], { compact: true })}</div>
                      <div className="text-[10px] text-gray-500 tnum">{fmtPct(ytdByCat[c.id] / (target * (currentMonth + 1)), 0)}</div>
                    </td>
                    <td className="px-2 py-1.5 text-right tnum text-gray-400">{fmtBRL(target, { compact: true })}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr className="border-t-2 border-gray-200 dark:border-gray-800 font-semibold bg-gray-50 dark:bg-gray-800/30">
                <td className="px-2 py-2 sticky left-0 bg-gray-50 dark:bg-gray-800/30 z-10 text-[11px] uppercase tracking-wider text-gray-500">Total</td>
                {MONTHS_PT.map((_, i) => {
                  const sum = cats.reduce((s, c) => s + get(c.id, i), 0);
                  const future = i > currentMonth;
                  const pct = sum / targetMonth;
                  const isCurrent = i === currentMonth;
                  return (
                    <td key={i} className={`px-1 py-2 text-center tnum ${future ? "opacity-30" : ""} ${isCurrent ? "bg-indigo-500/5" : ""}
                      ${pct > 1 ? "text-red-400" : pct > 0.85 ? "text-amber-400" : sum > 0 ? "text-gray-300" : "text-gray-600"}`}>
                      {sum > 0 ? fmtBRL(sum, { compact: true }) : (future ? "" : "—")}
                    </td>
                  );
                })}
                <td className="px-2 py-2 text-center tnum money font-bold text-gray-100">{fmtBRL(totalSpentYTD, { compact: true })}</td>
                <td className="px-2 py-2 text-right tnum money text-gray-400">{fmtBRL(targetMonth, { compact: true })}</td>
              </tr>
            </tfoot>
          </table>
        </div>
        <div className="mt-3 text-[10px] text-gray-500 px-1">
          Click numa célula → drilldown nas transações daquela categoria/mês <span className="text-gray-600">(em breve)</span>
        </div>
      </Card>
    </div>
  );
}

/* ---------- Faturas page (cross-card invoice history) ---------- */

function FaturasPage() {
  const [cardFilter, setCardFilter] = useState([]);
  const [statusFilter, setStatusFilter] = useState("all"); // all | open | paid

  const filtered = useMemo(() => {
    let xs = INVOICES;
    if (cardFilter.length) xs = xs.filter(i => cardFilter.includes(i.card));
    if (statusFilter === "open") xs = xs.filter(i => !i.isPaid);
    if (statusFilter === "paid") xs = xs.filter(i => i.isPaid);
    return [...xs].sort((a, b) => b.dueDate.localeCompare(a.dueDate));
  }, [cardFilter, statusFilter]);

            <div className="text-[10px] uppercase tracking-wider text-gray-500">finanças pessoais</div>
          </div>
        </div>

        <Card padding="p-6">
          <h1 className="text-base font-semibold mb-1">Entrar</h1>
          <p className="text-[12px] text-gray-500">Acesse sua workspace.</p>

          <form className="mt-5 space-y-4" onSubmit={(e) => { e.preventDefault(); window.location.hash = "#/dashboard"; }}>
            <Field label="E-mail">
              <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="seu@email.com" className={inputCls.replace("tnum", "")}/>
            </Field>
            <Field label="Senha" hint={<button type="button" className="text-indigo-400 hover:text-indigo-300 lowercase">esqueci</button>}>
              <div className="relative">
                <input type={showPass ? "text" : "password"} value={pass} onChange={e => setPass(e.target.value)} placeholder="••••••••" className={inputCls.replace("tnum", "") + " pr-9"}/>
                <button type="button" onClick={() => setShowPass(v => !v)} className="absolute right-2 top-1/2 -translate-y-1/2 w-7 h-7 inline-flex items-center justify-center rounded-md text-gray-500 hover:text-gray-300">
                  <Icon name={showPass ? "eye-off" : "eye"} className="w-3.5 h-3.5"/>
                </button>
              </div>
            </Field>
            <ToggleSwitch on={remember} onChange={setRemember} label="Manter conectado por 30 dias"/>
            <button type="submit" disabled={!valid}
              className={`w-full h-10 inline-flex items-center justify-center gap-1.5 rounded-lg text-[13px] font-semibold transition-colors mt-2
                ${valid ? "bg-indigo-500 hover:bg-indigo-400 text-white" : "bg-gray-200 dark:bg-gray-800 text-gray-500 cursor-not-allowed"}`}>
              Entrar <Icon name="arrow-right" className="w-3.5 h-3.5"/>
            </button>
          </form>
        </Card>

        <div className="mt-5 text-center text-[11px] text-gray-500">
          v1 · prototype · sem signup (single-owner)
        </div>
      </div>
    </div>
  );
}

/* ---------- Placeholder & Not found ---------- */

function Placeholder({ label }) {
  return (
    <Card padding="p-12" className="text-center">
      <div className="w-12 h-12 mx-auto rounded-2xl bg-gray-100 dark:bg-gray-800/50 flex items-center justify-center mb-4">
        <Icon name="layers" className="w-5 h-5 text-gray-500"/>
      </div>
      <h2 className="text-base font-medium">{label}</h2>
      <p className="text-[12px] text-gray-500 mt-1">Próximo batch do protótipo.</p>
      <div className="mt-6 inline-flex items-center gap-2 text-[11px] text-gray-500">
        <a href="#/dashboard" className="text-indigo-400 hover:text-indigo-300">← Voltar ao Dashboard</a>
      </div>
    </Card>
  );
}

function NotFound() {
  return (
    <Card padding="p-12" className="text-center">
      <h2 className="text-base font-medium">Não encontrado</h2>
      <p className="text-[12px] text-gray-500 mt-1">A rota solicitada não existe neste protótipo.</p>
      <a href="#/dashboard" className="inline-block mt-4 text-[11px] text-indigo-400 hover:text-indigo-300">← Voltar ao Dashboard</a>
    </Card>
  );
}

/* =====================================================================
 * APP — hash router
 * =================================================================== */

function useHashRoute() {
  const [route, setRoute] = useState(() => window.location.hash.slice(1) || "/dashboard");
  useEffect(() => {
    const onChange = () => setRoute(window.location.hash.slice(1) || "/dashboard");
    window.addEventListener("hashchange", onChange);
    return () => window.removeEventListener("hashchange", onChange);
  }, []);
  return route;
}

function App() {
  const route = useHashRoute();

  // Login route — render without shell (sidebar/topbar hidden)
  if (route === "/login") {
    return <LoginPage/>;
  }

  let page, breadcrumbs;
  if (route === "/dashboard") {
    page = <Dashboard/>;
    breadcrumbs = [{ label: "Dashboard" }];
  } else if (route === "/instituicoes") {
    page = <InstituicoesList/>;
    breadcrumbs = [{ label: "Estrutura", href: "#/instituicoes" }, { label: "Instituições" }];
  } else if (route.startsWith("/instituicao/")) {
    const id = route.split("/")[2];
    const fi = fiById[id];
    page = <FIHub fiId={id}/>;
    breadcrumbs = [
      { label: "Estrutura", href: "#/instituicoes" },
      { label: "Instituições", href: "#/instituicoes" },
      { label: fi ? fi.short : id }
    ];
  } else if (route === "/contas") {
    page = <ContasList/>;
    breadcrumbs = [{ label: "Estrutura" }, { label: "Contas" }];
  } else if (route.startsWith("/conta/")) {
    const id = route.split("/")[2];
    const acc = accById[id];
    page = <ContaDetail accId={id}/>;
    breadcrumbs = [
      { label: "Estrutura" },
      { label: "Contas", href: "#/contas" },
      { label: acc ? acc.name : id }
    ];
  } else if (route === "/cartoes") {
    page = <CartoesList/>;
    breadcrumbs = [{ label: "Caixa & Cartões" }, { label: "Cartões" }];
  } else if (route.startsWith("/cartao/")) {
    const id = route.split("/")[2];
    const card = cardById[id];
    page = <CartaoDetail cardId={id}/>;
    breadcrumbs = [
      { label: "Caixa & Cartões" },
      { label: "Cartões", href: "#/cartoes" },
      { label: card ? card.name : id }
    ];
  } else if (route === "/ativos") {
    page = <AtivosPage/>;
    breadcrumbs = [{ label: "Investimentos" }, { label: "Ativos" }];
  } else if (route.startsWith("/ativo/")) {
    const id = route.split("/")[2];
    const a = assetById[id];
    page = <AtivoDetailPage assetId={id}/>;
    breadcrumbs = [
      { label: "Investimentos" },
      { label: "Ativos", href: "#/ativos" },
      { label: a ? (a.ticker || a.name) : id }
    ];
  } else if (route === "/lancamentos") {
    page = <LancamentosPage/>;
    breadcrumbs = [{ label: "Investimentos" }, { label: "Lançamentos" }];
  } else if (route === "/proventos") {
    page = <ProventosPage/>;
    breadcrumbs = [{ label: "Investimentos" }, { label: "Proventos" }];
  } else if (route === "/movimentacoes") {
    page = <MovimentacoesPage/>;
    breadcrumbs = [{ label: "Caixa & Cartões" }, { label: "Movimentações" }];
  } else if (route === "/orcamento") {
    page = <OrcamentoPage/>;
    breadcrumbs = [{ label: "Caixa & Cartões" }, { label: "Orçamento" }];
  } else if (route === "/faturas") {
    page = <FaturasPage/>;
    breadcrumbs = [{ label: "Caixa & Cartões" }, { label: "Faturas" }];
  } else if (route === "/patrimonio") {
    page = <PatrimonioPage/>;
    breadcrumbs = [{ label: "Investimentos" }, { label: "Patrimônio" }];
  } else if (route === "/audit") {
    page = <AuditLogPage/>;
    breadcrumbs = [{ label: "Admin" }, { label: "Audit log" }];
  } else {
    const labelMap = {
      "/sys/fis": "Inst. Financeiras (sysadmin)",
    };
    const label = labelMap[route];
    if (label) {
      page = <Placeholder label={label}/>;
      breadcrumbs = [{ label }];
    } else {
      page = <NotFound/>;
      breadcrumbs = [{ label: "Não encontrado" }];
    }
  }

  return (
    <ComposerProvider>
      <div className="flex h-screen w-screen overflow-hidden">
        <Sidebar route={route}/>
        <div className="flex-1 flex flex-col min-w-0">
          <TopBar breadcrumbs={breadcrumbs} route={route}/>
          <main className="flex-1 overflow-y-auto scrollbar-thin">
            <div className="max-w-[1400px] mx-auto p-6">
              {page}
            </div>
          </main>
        </div>
      </div>
    </ComposerProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
  </script>
</body>
</html>
